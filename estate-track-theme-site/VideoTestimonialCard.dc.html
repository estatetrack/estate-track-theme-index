<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-bg: oklch(0.984 0.004 95); --color-surface: oklch(1 0 0); --color-surface-alt: oklch(0.963 0.005 95);
    --color-primary: oklch(0.31 0.018 255); --color-on-primary: oklch(0.985 0.004 95);
    --color-secondary: oklch(0.46 0.02 255); --color-accent: oklch(0.66 0.105 232); --color-on-accent: oklch(0.99 0.003 232);
    --color-text: oklch(0.24 0.012 260); --color-muted: oklch(0.53 0.012 260); --color-border: oklch(0.905 0.005 95);
    --font-heading: "Newsreader", Georgia, serif; --font-body: "Hanken Grotesk", system-ui, sans-serif; --font-mono: ui-monospace, Menlo, monospace;
    --text-xs: 0.75rem; --text-sm: 0.875rem; --text-base: 1rem; --text-lg: 1.125rem; --text-xl: 1.375rem;
    --radius: 10px; --radius-lg: 18px; --radius-full: 999px; --tracking-kicker: 0.16em;
    --shadow-sm: 0 1px 2px rgba(20,24,33,0.06), 0 1px 3px rgba(20,24,33,0.05); --shadow-md: 0 6px 18px rgba(20,24,33,0.08);
  }
  * { box-sizing: border-box; }
  body { margin: 0; }
</style>
</helmet>

<figure class="vt-card" onClick="{{ onPlay }}" style="margin: 0; display: flex; flex-direction: column; height: 100%; cursor: pointer; font-family: var(--font-body); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); transition: box-shadow .2s ease, transform .2s ease;" style-hover="box-shadow: var(--shadow-md); transform: translateY(-3px);">

  <!-- Poster -->
  <div style="position: relative; aspect-ratio: 4 / 5; overflow: hidden; background: var(--color-primary);">
    <sc-if value="{{ hasPhoto }}" hint-placeholder-val="{{ false }}"><img src="{{ photo }}" alt="" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;"></sc-if>
    <sc-if value="{{ noPhoto }}" hint-placeholder-val="{{ true }}"><div style="position: absolute; inset: 0; background-image: repeating-linear-gradient(45deg, oklch(0.36 0.02 255) 0 9px, transparent 9px 18px); background-color: var(--color-primary);"></div></sc-if>
    <div style="position: absolute; inset: 0; background: linear-gradient(180deg, color-mix(in oklch, var(--color-primary) 10%, transparent) 40%, color-mix(in oklch, var(--color-primary) 86%, transparent) 100%);"></div>

    <!-- Duration chip -->
    <span style="position: absolute; top: 14px; right: 14px; font-family: var(--font-mono); font-size: var(--text-xs); font-weight: 600; color: var(--color-on-primary); background: rgba(0,0,0,0.42); border-radius: var(--radius-full); padding: 4px 11px; backdrop-filter: blur(4px);">{{ duration }}</span>

    <!-- Play button -->
    <div class="vt-play" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 66px; height: 66px; border-radius: var(--radius-full); background: rgba(255,255,255,0.94); display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px -8px rgba(0,0,0,0.5); transition: transform .2s ease;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--color-primary)" style="margin-left: 3px;"><path d="M7 4.5v15l13-7.5z"></path></svg>
    </div>

    <!-- Name overlay -->
    <figcaption style="position: absolute; left: 0; right: 0; bottom: 0; padding: var(--space-5);">
      <div style="font-family: var(--font-heading); font-weight: 600; font-size: var(--text-xl); line-height: 1.15; color: var(--color-on-primary); margin-bottom: 3px;">{{ name }}</div>
      <div style="font-family: var(--font-mono); font-size: var(--text-xs); letter-spacing: 0.04em; text-transform: uppercase; color: var(--color-on-primary); opacity: 0.78;">{{ role }}</div>
    </figcaption>
  </div>

  <!-- Pull quote -->
  <div style="padding: var(--space-5) var(--space-6) var(--space-6); display: flex; flex-direction: column; flex: 1;">
    <blockquote style="margin: 0; font-family: var(--font-heading); font-size: var(--text-lg); line-height: 1.4; color: var(--color-text); flex: 1;">&ldquo;{{ quote }}&rdquo;</blockquote>
    <div style="display: flex; align-items: center; gap: 8px; margin-top: var(--space-5); color: var(--color-accent); font-size: var(--text-sm); font-weight: 600;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg>
      <span>{{ playLabel }}</span>
    </div>
  </div>
</figure>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:340,&quot;height&quot;:520},&quot;name&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;James &amp; Priya&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;role&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Sold in Cheltenham&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;quote&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;They made the whole thing feel effortless from start to finish.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;duration&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;1:24&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;photo&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onPlay&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props || {};
    const name = p.clientName || p.name || 'Client';
    const first = name.split(/\s+/)[0] || name;
    const generic = /[&]|family|\&/i.test(name) || /^(the|mr|mrs|ms|dr|miss)$/i.test(first);
    const photo = p.photo || '';
    const hasPhoto = !!photo;
    return {
      name,
      photo, hasPhoto, noPhoto: !hasPhoto,
      playLabel: generic ? 'Watch their story' : ('Watch ' + first + "'s story"),
      role: p.role || 'Client review',
      quote: p.quote || '',
      duration: p.duration || '1:00',
      onPlay: typeof p.onPlay === 'function' ? p.onPlay : () => {}
    };
  }
}
</script>
</body>
</html>
