<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-bg: oklch(0.984 0.004 95); --color-surface: oklch(1 0 0); --color-surface-alt: oklch(0.963 0.005 95);
    --color-primary: oklch(0.31 0.018 255); --color-on-primary: oklch(0.985 0.004 95);
    --color-secondary: oklch(0.46 0.02 255); --color-accent: oklch(0.66 0.105 232);
    --color-text: oklch(0.24 0.012 260); --color-muted: oklch(0.53 0.012 260); --color-border: oklch(0.905 0.005 95);
    --font-heading: "Newsreader", Georgia, serif; --font-body: "Hanken Grotesk", system-ui, sans-serif;
    --text-xs: 0.75rem; --text-sm: 0.875rem; --text-base: 1rem; --text-lg: 1.125rem; --text-xl: 1.375rem;
    --radius: 10px; --radius-lg: 18px; --radius-full: 999px;
    --shadow-sm: 0 1px 2px rgba(20,24,33,0.06), 0 1px 3px rgba(20,24,33,0.05);
    --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-5: 20px; --space-6: 24px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; }
</style>
</helmet>

<figure onClick="{{ onCardClick }}" style="{{ figStyle }}" style-hover="box-shadow: var(--shadow-md); transform: translateY(-2px);">
  <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-4);">
    <div style="color: var(--color-accent); font-size: var(--text-lg); letter-spacing: 2px;">{{ stars }}</div>
    <span style="display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-body); font-size: var(--text-xs); font-weight: 600; color: var(--color-secondary); border: 1px solid var(--color-border); border-radius: var(--radius-full); padding: 4px 11px;"><img src="{{ sourceIcon }}" alt="" width="13" height="13" style="display: block;" />{{ source }}</span>
  </div>
  <blockquote style="margin: 0 0 var(--space-5); font-family: var(--font-heading); font-size: var(--text-xl); line-height: 1.45; color: var(--color-text); flex: 1;">{{ quote }}<sc-if value="{{ truncated }}" hint-placeholder-val="{{ false }}"><span style="display: flex; width: fit-content; align-items: center; gap: 5px; margin-top: var(--space-3); font-family: var(--font-body); font-size: var(--text-sm); font-weight: 600; color: var(--color-accent);">Read full review →</span></sc-if></blockquote>
  <figcaption style="display: flex; align-items: center; gap: var(--space-3); border-top: 1px solid var(--color-border); padding-top: var(--space-4);">
    <span style="width: 40px; height: 40px; border-radius: var(--radius-full); background: var(--color-surface-alt); color: var(--color-secondary); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: var(--text-sm); flex: none;">{{ initials }}</span>
    <span style="display: flex; flex-direction: column;">
      <span style="font-weight: 600; font-size: var(--text-sm); color: var(--color-text);">{{ author }}</span>
      <span style="font-size: var(--text-xs); color: var(--color-muted);">{{ date }}</span>
    </span>
  </figcaption>
</figure>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:380,&quot;height&quot;:300},&quot;quote&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;All I've got to say is that they're the best estate agents I've ever dealt with. I can't recommend them highly enough.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;author&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Angela Ho&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;date&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;4 days ago&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;rating&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:5,&quot;min&quot;:1,&quot;max&quot;:5,&quot;tsType&quot;:&quot;number&quot;},&quot;source&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Google&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;truncated&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;onExpand&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props || {};
    const r = Math.max(0, Math.min(5, parseInt(p.rating, 10) || 5));
    const stars = '\u2605'.repeat(r) + '\u2606'.repeat(5 - r);
    const author = p.author || '';
    const initials = author.split(/\s+/).filter(Boolean).slice(0, 2).map(w => w[0]).join('').toUpperCase() || '—';
    const truncated = !!p.truncated;
    const onExpand = typeof p.onExpand === 'function' ? p.onExpand : null;
    const figStyle = {
      margin: 0, display: 'flex', flexDirection: 'column', height: '100%', fontFamily: 'var(--font-body)',
      background: 'var(--color-surface)', border: '1px solid var(--color-border)', borderRadius: 'var(--radius-lg)',
      padding: 'var(--space-6)', boxShadow: 'var(--shadow-sm)',
      cursor: truncated ? 'pointer' : 'default', transition: 'box-shadow .2s ease, transform .2s ease'
    };
    return {
      stars, quote: p.quote || '', author, date: p.date || '',
      source: p.source || 'Google', sourceIcon: (p.source === 'Trustpilot') ? 'assets/trustpilot-star.svg' : 'assets/google-g.svg', initials,
      truncated, figStyle, onCardClick: truncated && onExpand ? onExpand : (() => {})
    };
  }
}
</script>
</body>
</html>
