<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-surface: oklch(1 0 0); --color-surface-alt: oklch(0.963 0.005 95);
    --color-accent: oklch(0.66 0.105 232); --color-text: oklch(0.24 0.012 260); --color-muted: oklch(0.53 0.012 260); --color-border: oklch(0.905 0.005 95);
    --font-body: "Hanken Grotesk", system-ui, sans-serif;
    --text-xs: 0.75rem; --text-sm: 0.875rem; --radius-sm: 6px; --radius: 10px;
    --shadow-lg: 0 22px 48px -18px rgba(20,24,33,0.22);
  }
  * { box-sizing: border-box; }
  body { margin: 0; }
</style>
</helmet>

<div style="position: relative; display: flex; flex-direction: column; gap: 5px; font-family: var(--font-body);">
  <sc-if value="{{ hasLabel }}" hint-placeholder-val="{{ true }}"><span style="font-size: var(--text-xs); font-weight: 600; color: var(--color-muted); text-transform: uppercase; letter-spacing: 0.04em;">{{ label }}</span></sc-if>
  <button onClick="{{ toggle }}" style="display: flex; align-items: center; justify-content: space-between; gap: 8px; width: 100%; font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); padding: 0 15px; min-height: 50px; cursor: pointer; text-align: left;">
    <span style="{{ selectedStyle }}">{{ selected }}</span>
    <span style="{{ dotStyle }}"></span>
  </button>
  <sc-if value="{{ open }}" hint-placeholder-val="{{ false }}">
    <div style="position: absolute; top: calc(100% + 6px); left: 0; right: auto; min-width: 100%; width: max-content; max-width: 80vw; z-index: 95; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 5px; max-height: 268px; overflow-y: auto;">
      <sc-for list="{{ items }}" as="o" hint-placeholder-count="5"><button onClick="{{ o.onPick }}" style="{{ o.style }}"><span style="{{ o.dotStyle }}"></span>{{ o.label }}</button></sc-for>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:220,&quot;height&quot;:70},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Min price&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;options&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string[]&quot;},&quot;placeholder&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Select&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;value&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;onChange&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(value: string) =&gt; void&quot;}}">
class Component extends DCLogic {
  state = { open: false, idx: 0 };
  renderVals() {
    const p = this.props || {};
    const opts = Array.isArray(p.options) ? p.options : [];
    // Controlled mode: parent passes `value` (a label) + `onChange`. Otherwise internal idx.
    const controlled = p.value != null && p.onChange;
    const placeholder = p.placeholder || 'Select';
    const hasPlaceholder = p.value === '' || (!controlled && false);
    let idx;
    if (controlled) {
      idx = opts.indexOf(p.value);
    } else {
      idx = Math.min(this.state.idx, Math.max(0, opts.length - 1));
    }
    const itemBase = { display: 'flex', alignItems: 'center', gap: '10px', width: '100%', textAlign: 'left', fontFamily: 'var(--font-body)', fontSize: 'var(--text-sm)', whiteSpace: 'nowrap', border: 'none', borderRadius: 'var(--radius-sm)', padding: '10px 12px', cursor: 'pointer', transition: 'background .12s ease' };
    const dot = (on) => ({ width: '7px', height: '7px', borderRadius: '999px', flex: 'none', background: on ? 'var(--color-accent)' : 'transparent', border: on ? 'none' : '1.5px solid var(--color-border)' });
    const items = opts.map((o, i) => ({
      label: o,
      onPick: () => { if (controlled) { p.onChange(o); this.setState({ open: false }); } else { this.setState({ idx: i, open: false }); } },
      dotStyle: dot(i === idx),
      style: Object.assign({}, itemBase, i === idx ? { background: 'var(--color-surface-alt)', color: 'var(--color-accent)', fontWeight: 600 } : { background: 'transparent', color: 'var(--color-text)' })
    }));
    const sel = idx >= 0 ? opts[idx] : null;
    const isPlaceholder = !sel;
    return {
      label: p.label || '', hasLabel: !!p.label,
      selected: sel || placeholder,
      selectedStyle: { overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', color: isPlaceholder ? 'var(--color-muted)' : 'var(--color-text)' },
      open: this.state.open,
      toggle: () => this.setState(s => ({ open: !s.open })),
      items,
      dotStyle: { width: '7px', height: '7px', borderRadius: '999px', background: 'var(--color-accent)', flex: 'none' }
    };
  }
}
</script>
</body>
</html>
